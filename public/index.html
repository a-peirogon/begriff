        </div>
        

      </div>
    </div>
    
    
    <div class="tree-dir" data-slug="matematicas">
      <button class="tree-dir-header" onclick="toggleDir(this.parentNode)">

      <div class="tree-dir-children">

          <button class="tree-dir-header" onclick="toggleDir(this.parentNode); event.stopPropagation();">

    </div>
    
    
    <div class="tree-dir" data-slug="raw">

  </div>

</aside>

<script>
function toggleNewMenu(btn) {
  const menu = btn.parentNode.querySelector('.sidebar-new-menu');
  const isOpen = menu.classList.contains('open');
  document.querySelectorAll('.sidebar-new-menu.open').forEach(m => m.classList.remove('open'));
  menu.classList.toggle('open', !isOpen);
}
document.addEventListener('click', (e) => {
  if (!e.target.closest('.sidebar-new')) {
    document.querySelectorAll('.sidebar-new-menu.open').forEach(m => m.classList.remove('open'));
  }
});

function filterTree(query) {
  const q = query.trim().toLowerCase();
  const leaves = document.querySelectorAll('#sidebar-tree .tree-leaf');
  const dirs = document.querySelectorAll('#sidebar-tree .tree-dir');

  if (!q) {
    leaves.forEach(l => l.style.display = '');
    dirs.forEach(d => { d.style.display = ''; d.classList.remove('open'); });
    return;
  }

  leaves.forEach(l => {
    const match = l.dataset.name.includes(q);
    l.style.display = match ? '' : 'none';
  });

  // Mostrar y abrir solo las carpetas que contienen al menos un match
  dirs.forEach(d => {
    const hasMatch = d.querySelectorAll('.tree-leaf').length &&
      Array.from(d.querySelectorAll('.tree-leaf')).some(l => l.style.display !== 'none');
    d.style.display = hasMatch ? '' : 'none';
    if (hasMatch) d.classList.add('open');
  });
}
</script>
