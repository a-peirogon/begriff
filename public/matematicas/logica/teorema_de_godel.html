<script>
function toggleDir(el) { el.classList.toggle('open'); }
document.addEventListener('DOMContentLoaded', () => {
  const active = document.querySelector('.tree-leaf.active');
  if (active) {
    let node = active.parentNode;
    while (node && !node.classList.contains('sidebar')) {
      if (node.classList.contains('tree-dir')) node.classList.add('open');
      node = node.parentNode;
    }
  }
});
